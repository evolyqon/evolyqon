<!DOCTYPE html>
<html>
<head>
    <title>Evolyqon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            background: #000;
        }

        body {
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            overflow-x: hidden;
            background:
                radial-gradient(circle at 50% 18%, rgba(0, 132, 255, 0.22), transparent 30%),
                radial-gradient(circle at 50% 52%, rgba(120, 70, 255, 0.13), transparent 35%),
                linear-gradient(180deg, #020814 0%, #000000 68%);
        }

        .page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: clamp(36px, 6vw, 80px) 22px;
        }

        .content {
            width: 100%;
            max-width: 1100px;
        }

        .logo {
            width: clamp(320px, 72vw, 920px);
            max-width: 100%;
            display: block;
            margin: 0 auto clamp(18px, 3vw, 32px);
            filter:
                drop-shadow(0 0 25px rgba(0, 132, 255, 0.35))
                drop-shadow(0 0 55px rgba(115, 70, 255, 0.22));
        }

        .divider {
            width: clamp(260px, 48vw, 520px);
            height: 1px;
            margin: clamp(12px, 2vw, 24px) auto clamp(22px, 3vw, 32px);
            background: linear-gradient(
                90deg,
                transparent,
                rgba(0, 160, 255, 0.65),
                rgba(140, 80, 255, 0.55),
                transparent
            );
            box-shadow: 0 0 18px rgba(0, 132, 255, 0.45);
        }

        .system-line {
            color: rgba(255, 255, 255, 0.78);
            font-size: clamp(11px, 1.3vw, 14px);
            letter-spacing: clamp(3px, 0.55vw, 7px);
            text-transform: uppercase;
            line-height: 2;
            max-width: 850px;
            margin: 0 auto;
        }

        .system-line span {
            color: #2aa8ff;
            text-shadow: 0 0 16px rgba(0, 132, 255, 0.8);
        }

        .mission {
            margin: clamp(20px, 3vw, 30px) auto 0;
            max-width: 680px;
            color: rgba(255, 255, 255, 0.56);
            font-size: clamp(14px, 1.6vw, 17px);
            line-height: 1.8;
            font-weight: 300;
        }

        .actions {
            margin-top: clamp(30px, 4vw, 42px);
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            min-width: 180px;
            padding: 15px 28px;
            border-radius: 999px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 12px;
            color: white;
            transition: 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(90deg, #168dff, #755cff);
            box-shadow: 0 0 28px rgba(0, 132, 255, 0.5);
        }

        .btn-secondary {
            border: 1px solid rgba(90, 170, 255, 0.35);
            background: rgba(255, 255, 255, 0.035);
            color: rgba(255,255,255,0.82);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow:
                0 0 30px rgba(0, 132, 255, 0.55),
                0 0 60px rgba(115, 70, 255, 0.22);
        }

        .footer {
            margin-top: clamp(38px, 5vw, 56px);
            color: rgba(255, 255, 255, 0.28);
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Tablet */
        @media (max-width: 900px) {
            .logo {
                width: 88vw;
            }

            .content {
                max-width: 760px;
            }
        }

        /* Phone */
        @media (max-width: 600px) {
            .page {
                align-items: flex-start;
                padding-top: 58px;
                padding-bottom: 44px;
            }

            .logo {
                width: 105vw;
                max-width: none;
                margin-left: 50%;
                transform: translateX(-50%);
            }

            .system-line {
                max-width: 92%;
                line-height: 2.15;
            }

            .mission {
                max-width: 92%;
            }

            .actions {
                gap: 14px;
            }

            .btn {
                width: 100%;
                max-width: 280px;
            }
        }

        /* Small phone */
        @media (max-width: 390px) {
            .page {
                padding-top: 46px;
            }

            .logo {
                width: 112vw;
            }

            .btn {
                max-width: 260px;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <section class="content">

            <img src="evolyqon_full_logo_transparent_4x.png" alt="Evolyqon Logo" class="logo">

            <div class="divider"></div>

            <div class="system-line">
                <span>Neural AI</span> • Human Evolution • Future Technology
            </div>

            <p class="mission">
                A future-focused intelligence platform designed to help people think, organize,
                learn, and evolve through advanced artificial intelligence.
            </p>

            <div class="actions">
                <a href="mailto:hello@evolyqon.com" class="btn btn-primary">Contact</a>
                <a href="#" class="btn btn-secondary">Coming Soon</a>
            </div>

            <div class="footer">
                © 2026 Evolyqon
            </div>

        </section>
    </main>
</body>
</html>
