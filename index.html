<!DOCTYPE html>
<html>
<head>
    <title>Evolyqon</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at 50% 18%, rgba(0, 120, 255, 0.18), transparent 30%),
                radial-gradient(circle at 50% 45%, rgba(120, 70, 255, 0.12), transparent 35%),
                #000000;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            overflow-x: hidden;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        .logo {
            width: min(92vw, 900px);
            max-width: 900px;
            filter: drop-shadow(0 0 30px rgba(0, 132, 255, 0.35));
            margin-bottom: 35px;
        }

        .description {
            max-width: 760px;
            color: rgba(255,255,255,0.68);
            font-size: 1.05rem;
            line-height: 1.7;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .buttons {
            margin-top: 38px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 14px 30px;
            border-radius: 999px;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.3s ease;
        }

        .primary {
            background: linear-gradient(90deg, #168dff, #805cff);
            color: white;
            box-shadow: 0 0 25px rgba(0, 132, 255, 0.45);
        }

        .secondary {
            border: 1px solid rgba(255,255,255,0.18);
            color: white;
            background: rgba(255,255,255,0.04);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 35px rgba(0, 132, 255, 0.55);
        }

        .footer {
            position: fixed;
            bottom: 24px;
            color: rgba(255,255,255,0.35);
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .logo {
                width: 100%;
            }

            .description {
                font-size: 0.95rem;
            }

            .footer {
                position: static;
                margin-top: 50px;
            }
        }
    </style>
</head>

<body>
    <main class="page">

        <img src="logo.png" alt="Evolyqon Logo" class="logo">

        <p class="description">
            Building intelligent technology for the next era of human progress —
            combining artificial intelligence, neural systems, and future-focused innovation.
        </p>

        <div class="buttons">
            <a href="mailto:hello@evolyqon.com" class="btn primary">Contact</a>
            <a href="#" class="btn secondary">Coming Soon</a>
        </div>

        <div class="footer">
            © 2026 Evolyqon
        </div>

    </main>
</body>
</html>
